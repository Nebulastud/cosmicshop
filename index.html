<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COSMIC SHOP - Modern</title>

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        /* HEADER */
        header {
            padding: 25px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(7px);
            animation: fadeDown 1s ease;
        }

        /* HERO SECTION */
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(3px);
            animation: fadeIn 1.3s ease;
        }

        .hero h1 {
            font-size: 50px;
            margin: 0;
            animation: slideUp 1.3s ease;
        }

        .hero p {
            max-width: 600px;
            font-size: 18px;
            opacity: 0.9;
            animation: fadeIn 2s ease;
        }

        section {
            padding: 60px 20px;
            text-align: center;
            background: rgba(0,0,0,0.45);
            margin: 20px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            animation: fadeIn 1.2s ease;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.2);
            animation: fadeUp 1.2s ease;
        }

        .bottom-nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .bottom-nav i {
            font-size: 22px;
            margin-bottom: 4px;
            transition: 0.3s;
        }

        .bottom-nav a:hover i {
            transform: scale(1.25);
            color: #00eaff;
        }

        .bottom-nav a:hover {
            color: #00eaff;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <header>COSMIC SHOP</header>

    <div class="hero" id="home">
        <h1>Selamat Datang</h1>
        <p>Toko online modern dengan tampilan futuristik dan elegan. Belanja dengan gaya kosmik.</p>
    </div>

    <section id="toko">
        <h2><i class="fa-solid fa-shop"></i> Produk Kami</h2>
        <p>Tambahkan daftar produk di sini...</p>
    </section>

    <section id="testimoni">
        <h2><i class="fa-solid fa-comments"></i> Testimoni</h2>
        <p>Masukkan testimoni pelanggan di sini...</p>
    </section>

    <section id="kontak">
        <h2><i class="fa-solid fa-phone"></i> Kontak</h2>
        <p>Hubungi kami melalui WA, IG, atau Email.</p>
    </section>

    <!-- BOTTOM NAVIGATION MODERN -->
    <div class="bottom-nav">
        <a href="#home">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="#toko">
            <i class="fa-solid fa-store"></i>
            Toko
        </a>

        <a href="#testimoni">
            <i class="fa-solid fa-star"></i>
            Testimoni
        </a>

        <a href="#kontak">
            <i class="fa-solid fa-phone"></i>
            Kontak
        </a>
    </div>

</body>
</html>
