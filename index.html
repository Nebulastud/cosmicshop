<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COSMIC SHOP</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            color: white;
        }

        header .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Navigation */
        nav {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #ffd700;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 20px;
            max-width: 600px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body style="background-image: url('background.jpg');">

    <header>
        <div class="logo">COSMIC SHOP</div>
    </header>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#testimoni">Testimoni</a></li>
            <li><a href="#toko">Toko</a></li>
            <li><a href="#kontak">Kontak</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <div>
            <h1>Selamat Datang di COSMIC SHOP</h1>
            <p>Toko online dengan desain modern, elegan, dan profesional. Temukan produk terbaik hanya di sini!</p>
        </div>
    </section>

    <footer>
        &copy; 2025 COSMIC SHOP. All Rights Reserved.
    </footer>

</body>
</html>
