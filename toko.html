<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COSMIC SHOP - Toko</title>

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(60%);
        }

        header {
            padding: 25px;
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            background: rgba(0,0,0,0.55);
            letter-spacing: 2px;
        }

        /* SEARCH + CATEGORY */
        .filter-box {
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
        }

        .filter-box input {
            width: 80%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .kategori {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .kategori button {
            padding: 7px 12px;
            border: none;
            border-radius: 10px;
            background: #00eaff;
            color: black;
            cursor: pointer;
            font-weight: 600;
        }

        .kategori button:hover {
            background: white;
        }

        /* PRODUCT GRID */
        .produk-container {
            padding: 20px;
            margin-bottom: 90px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
        }

        .produk {
            background: rgba(0,0,0,0.55);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(255,255,255,0.15);
            transition: 0.3s;
            cursor: pointer;
        }

        .produk:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,255,255,0.6);
        }

        .produk img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        /* MODAL DETAIL PRODUK */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: black;
            padding: 15px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px cyan;
        }

        .modal-content img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .close {
            float: right;
            font-size: 22px;
            cursor: pointer;
        }

        /* NEW: BUTTON BELI */
        .btn-beli-detail {
            display: inline-block;
            padding: 10px 15px;
            background: #00eaff;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            margin-top: 15px;
        }

        .btn-beli-detail:hover {
            background: white;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .bottom-nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .bottom-nav i {
            font-size: 22px;
            margin-bottom: 4px;
            transition: 0.3s;
        }

        .bottom-nav a:hover i {
            transform: scale(1.25);
            color: #00eaff;
        }

    </style>
</head>

<body>

    <!-- VIDEO -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <header>
        TOKO DIGITAL
    </header>

    <!-- FILTER -->
    <div class="filter-box">
        <input type="text" id="searchInput" placeholder="Cari produk...">

        <div class="kategori">
            <button onclick="filterKategori('all')">Semua</button>
            <button onclick="filterKategori('apps')">Apps Premium</button>
            <button onclick="filterKategori('murah')">Murah</button>
            <button onclick="filterKategori('digital')">Digital</button>
        </div>
    </div>

    <!-- PRODUK -->
    <div class="produk-container" id="produkList">

        <div class="produk" data-kategori="apps"
            onclick="openDetail('produk1.jpg','Spotify','Spotify Student','Spotify Individu)">
            <img src="produk1.jpg">
            <h3>Spotify</h3>
            <p>Premium</p>
        </div>

        <div class="produk" data-kategori="digital"
            onclick="openDetail('produk2.jpg','Produk 2','Deskripsi lengkap produk 2')">
            <img src="produk2.jpg">
            <h3>Produk 2</h3>
            <p>Digital</p>
        </div>

        <div class="produk" data-kategori="murah"
            onclick="openDetail('produk3.jpg','Produk 3','Produk murah dan berkualitas')">
            <img src="produk3.jpg">
            <h3>Produk 3</h3>
            <p>Murah</p>
        </div>

        <div class="produk" data-kategori="premium"
            onclick="openDetail('produk4.jpg','Produk 4','Produk premium terbaik')">
            <img src="produk4.jpg">
            <h3>Produk 4</h3>
            <p>Premium</p>
        </div>

    </div>

    <!-- MODAL DETAIL -->
    <div class="modal" id="modalDetail">
        <div class="modal-content">
            <span class="close" onclick="closeDetail()">&times;</span>
            <img id="detailImg">
            <h2 id="detailTitle"></h2>
            <p id="detailDesc"></p>

            <!-- TOMBOL BELI -->
            <a id="detailBuyBtn" class="btn-beli-detail" href="#" target="_blank">Beli Sekarang</a>
        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        // SEARCH
        document.getElementById("searchInput").addEventListener("keyup", function () {
            let value = this.value.toLowerCase();
            let produk = document.querySelectorAll(".produk");

            produk.forEach(p => {
                let nama = p.querySelector("h3").innerText.toLowerCase();
                p.style.display = nama.includes(value) ? "block" : "none";
            });
        });

        // FILTER
        function filterKategori(kat) {
            let produk = document.querySelectorAll(".produk");
            produk.forEach(p => {
                let jenis = p.getAttribute("data-kategori");
                p.style.display = (kat === "all" || jenis === kat) ? "block" : "none";
            });
        }

        // MODAL DETAIL + LINK BELI
        function openDetail(img, title, desc) {
            document.getElementById("detailImg").src = img;
            document.getElementById("detailTitle").innerText = title;
            document.getElementById("detailDesc").innerText = desc;

            // 👉 Auto WhatsApp Fill
            let wa = "https://wa.me/6283821627163?text=" + encodeURIComponent("Halo, Saya mau beli " + title);
            document.getElementById("detailBuyBtn").href = wa;

            document.getElementById("modalDetail").style.display = "flex";
        }

        function closeDetail() {
            document.getElementById("modalDetail").style.display = "none";
        }
    </script>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <a href="index.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="toko.html">
            <i class="fa-solid fa-store"></i>
            Toko
        </a>

        <a href="index1.html">
            <i class="fa-solid fa-star"></i>
            Testimoni
        </a>

        <a href="kontak.html">
            <i class="fa-solid fa-phone"></i>
            Kontak
        </a>
    </div>

</body>
</html>
