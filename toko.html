<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COSMIC SHOP - Toko</title>

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(60%);
        }

        /* PAGE TITLE */
        header {
            padding: 25px;
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            background: rgba(0,0,0,0.55);
            letter-spacing: 2px;
        }

        /* PRODUCT GRID */
        .produk-container {
            padding: 20px;
            margin-bottom: 90px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
        }

        .produk {
            background: rgba(0,0,0,0.55);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(255,255,255,0.15);
            transition: 0.3s;
        }

        .produk:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,255,255,0.6);
        }

        .produk img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .produk h3 {
            font-size: 16px;
            margin: 5px 0;
        }

        .produk p {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .btn-beli {
            padding: 8px 11px;
            background: #00eaff;
            border-radius: 8px;
            color: black;
            font-weight: 600;
            text-decoration: none;
        }

        .btn-beli:hover {
            background: white;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .bottom-nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .bottom-nav i {
            font-size: 22px;
            margin-bottom: 4px;
            transition: 0.3s;
        }

        .bottom-nav a:hover i {
            transform: scale(1.25);
            color: #00eaff;
        }

        .bottom-nav a:hover {
            color: #00eaff;
        }
    </style>
</head>

<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <header>
        TOKO DIGITAL
    </header>

    <!-- PRODUK LIST -->
    <div class="produk-container">

        <div class="produk">
            <img src="produk1.jpg">
            <h3>Produk 1</h3>
            <p>Deskripsi singkat produk.</p>
            <a class="btn-beli" href="#">Beli Sekarang</a>
        </div>

        <div class="produk">
            <img src="produk2.jpg">
            <h3>Produk 2</h3>
            <p>Deskripsi singkat.</p>
            <a class="btn-beli" href="#">Beli Sekarang</a>
        </div>

        <div class="produk">
            <img src="produk3.jpg">
            <h3>Produk 3</h3>
            <p>Harga terjangkau.</p>
            <a class="btn-beli" href="#">Beli Sekarang</a>
        </div>

        <div class="produk">
            <img src="produk4.jpg">
            <h3>Produk 4</h3>
            <p>Produk digital terbaik.</p>
            <a class="btn-beli" href="#">Beli Sekarang</a>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <a href="index.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="toko.html">
            <i class="fa-solid fa-store"></i>
            Toko
        </a>

        <a href="index2.html">
            <i class="fa-solid fa-star"></i>
            Testimoni
        </a>

        <a href="kontak.html">
            <i class="fa-solid fa-phone"></i>
            Kontak
        </a>
    </div>

</body>
</html>
