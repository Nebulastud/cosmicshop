<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COSMIC SHOP - Kontak</title>

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(60%);
            z-index: -1;
        }

        /* HEADER */
        header {
            padding: 25px;
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            background: rgba(0,0,0,0.55);
            letter-spacing: 2px;
        }

        /* CONTACT BOX */
        .contact-container {
            padding: 25px;
            margin-bottom: 100px;
        }

        .contact-box {
            background: rgba(0,0,0,0.55);
            border-radius: 20px;
            padding: 25px;
            margin: 15px 0;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(255,255,255,0.08);
            animation: fadeIn 1.2s ease;
        }

        .contact-box i {
            font-size: 35px;
            margin-bottom: 10px;
            color: #00eaff;
        }

        .contact-box h3 {
            margin: 0;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .contact-box p {
            margin: 0;
            opacity: 0.9;
            font-size: 15px;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .bottom-nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .bottom-nav i {
            font-size: 22px;
            margin-bottom: 4px;
            transition: 0.3s;
        }

        .bottom-nav a:hover i {
            transform: scale(1.25);
            color: #00eaff;
        }

        .bottom-nav a:hover {
            color: #00eaff;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

</head>

<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <!-- HEADER -->
    <header>
        HUBUNGI KAMI
    </header>

    <!-- CONTACT CONTENT -->
    <div class="contact-container">

        <div class="contact-box">
            <i class="fa-brands fa-whatsapp"></i>
            <h3>WhatsApp</h3>
            <p>0812-3456-7890</p>
        </div>

        <div class="contact-box">
            <i class="fa-solid fa-envelope"></i>
            <h3>Email</h3>
            <p>cosmicshop@gmail.com</p>
        </div>

        <div class="contact-box">
            <i class="fa-solid fa-location-dot"></i>
            <h3>Alamat</h3>
            <p>Bandung, Jawa Barat</p>
        </div>

        <div class="contact-box">
            <i class="fa-brands fa-instagram"></i>
            <h3>Instagram</h3>
            <p>@cosmicshop.id</p>
        </div>

    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <a href="index.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="toko.html">
            <i class="fa-solid fa-store"></i>
            Toko
        </a>

        <a href="index1.html">
            <i class="fa-solid fa-star"></i>
            Testimoni
        </a>

        <a href="kontak.html">
            <i class="fa-solid fa-phone"></i>
            Kontak
        </a>
    </div>

</body>
</html>
